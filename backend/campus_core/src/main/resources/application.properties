spring.application.name=campus_core
server.port=8080

spring.config.import=classpath:application-secrets.properties
spring.data.mongodb.database=smartcampus

spring.data.mongodb.serialization-inclusion=ALWAYS

file.upload-dir=uploads

# Spring Security default credentials
spring.security.user.name=user
spring.security.user.password=password

# File storage
file.upload-dir=./uploads
file.max-size=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# SLA targets (minutes) - optionally externalize
sla.critical.first-response=60
sla.critical.resolution=240
sla.high.first-response=240
sla.high.resolution=1440