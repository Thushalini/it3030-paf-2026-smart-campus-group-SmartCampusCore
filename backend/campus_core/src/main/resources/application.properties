spring.application.name=campus_core
server.port=8080

spring.config.import=optional:classpath:application-dev.properties
spring.data.mongodb.database=smartcampus

logging.level.org.springframework.security=DEBUG
spring.devtools.add-properties=true

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param

# File storage
file.upload-dir=./uploads
file.max-size=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# SLA targets (minutes)
sla.critical.first-response=60
sla.critical.resolution=240
sla.high.first-response=240
sla.high.resolution=1440
