spring.application.name=campus_core
server.port=8080

spring.config.import=classpath:application-secrets.properties
spring.data.mongodb.database=smartcampus

# Logging
logging.level.org.springframework.security=DEBUG

# DevTools logging
spring.devtools.add-properties=true

# Error responses
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param

# Jackson serialization
spring.jackson.default-property-inclusion=always

# File storage
file.upload-dir=./uploads
file.max-size=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# SLA targets (minutes)
sla.critical.first-response=60
sla.critical.resolution=240
sla.high.first-response=240
sla.high.resolution=1440